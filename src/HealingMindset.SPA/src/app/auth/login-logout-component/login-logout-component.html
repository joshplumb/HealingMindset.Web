<div class="bg-cover bg-center bg-fixed" style="background-image: url('https://picsum.photos/id/108/1920/1080')">
    <div class="h-screen flex justify-center items-center">
        <div class="bg-white mx-4 p-8 rounded shadow-md w-full md:w-1/2 lg:w-1/3">
            @if(_currentUserSubject$ | async; as user)
            {
            <h1 class="text-3xl font-bold mb-8 text-center">Logout</h1>
            <div class="mb-4">
                <div class="mb-6">
                    <button (click)="onSubmitLogout()"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                        type="button">
                        Logout
                    </button>
                </div>
            </div>
            }
            @else
            {
            <h1 class="text-3xl font-bold mb-8 text-center">Login</h1>
            <form [formGroup]="loginForm">
                <div class="mb-4">
                    <div class="mb-6">
                        <button
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                            type="button">
                            Login
                        </button>
                    </div>
                    <div class="mb-4">
                        <label class="block font-semibold text-gray-700 mb-2" for="email">
                            Email Address
                        </label>
                        <input class="border rounded w-1/2 py-2 px-3
                            text-gray-700 
                            leading-tight   
                            focus:outline-none 
                            focus:shadow-outline" id="email" type="email" formControlName="email"
                            placeholder="Enter your email address" />
                    </div>
                    <label class="block font-semibold text-gray-700 mb-2" for="password">
                        Password
                    </label>
                    <input class="border rounded w-1/2 py-2 px-3
                                    text-gray-700 mb-3 leading-tight 
                                    focus:outline-none 
                                    focus:shadow-outline" id="password" type="password" formControlName="password"
                        placeholder="Enter your password" />
                    <div class="mb-6">
                        <button (click)="onSubmitLogin()"
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                            type="button">
                            Login
                        </button>
                    </div>
                    <div>
                        <a class="text-gray-600 hover:text-gray-800" href="#">Forgot your password?</a>
                    </div>
                </div>
            </form>
            }
            <div>
                <a class="text-gray-600 hover:text-gray-800" href="#">Forgot your password?</a>
            </div>
        </div>
    </div>
</div>
