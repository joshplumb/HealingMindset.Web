<div class="flex min-h-screen bg-[#fff5f5]">
  <aside class="w-64 border-r border-[#fecaca] bg-white p-6 shadow-sm">
    <nav class="space-y-4">
      <h2 class="font-serif text-xl italic text-healing-deep mb-8">Healing Mindset</h2>
      
      <a routerLink="/" 
         routerLinkActive="bg-healing-pink text-healing-rose" 
         [routerLinkActiveOptions]="{exact: true}"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         Home
      </a>

      <a routerLink="/video-component" 
         routerLinkActive="bg-healing-pink text-healing-rose"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         Video Library
      </a>

      <a routerLink="/podcast-component"  
         routerLinkActive="bg-healing-pink text-healing-rose"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         Podcast library
      </a>

      <a routerLink="/login-logout-component" 
         routerLinkActive="bg-healing-pink text-healing-rose"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         @if(isLoggedIn$ | async)
         {
            Logout
         }
         @else{
            Login
         }
      </a>

      <a routerLink="/register-component" 
         routerLinkActive="bg-healing-pink text-healing-rose"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         Register a New Account
      </a>

      <a routerLink="/add-video-component" 
         routerLinkActive="bg-healing-pink text-healing-rose"
         class="block rounded-xl px-4 py-3 font-medium transition-colors hover:bg-[#fff1f2]">
         Add a new video
      </a>
    </nav>
  </aside>

  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>
</div>
